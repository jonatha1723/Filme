<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tela Cheia</title>

<style>
    body{
        margin:0;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#0f172a;
        font-family:Arial, sans-serif;
    }

    button{
        padding:18px 40px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        background:#2563eb;
        color:white;
        font-weight:600;
    }

    button:hover{
        background:#1d4ed8;
    }
</style>
</head>

<body>

<button onclick="telaCheia()">Entrar em tela cheia</button>

<script>
function telaCheia() {
    const el = document.documentElement;

    if (el.requestFullscreen) {
        el.requestFullscreen();
    } 
    else if (el.webkitRequestFullscreen) { // Safari
        el.webkitRequestFullscreen();
    } 
    else if (el.msRequestFullscreen) { // Edge antigo
        el.msRequestFullscreen();
    }
}
</script>

</body>
</html>
