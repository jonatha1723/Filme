<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Vault | chatprivit RTDB</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #2563eb;
            --text: #ffffff;
            --text-dim: #71717a;
            --danger: #dc2626;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; overflow-x: hidden; }

        /* Login Layout */
        #auth-view { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .input-group { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px; margin-bottom: 12px; display: flex; border: 1px solid var(--border); }
        input { background: transparent; border: none; color: white; width: 100%; padding-left: 10px; outline: none; font-size: 16px; }
        .btn-main { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }

        /* App Layout */
        #app-view { display: none; padding: 20px; max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .media-card { aspect-ratio: 1; background: #0a0a0a; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; }
        .media-card:hover .overlay { opacity: 1; }
        
        /* Floating Button */
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 100; }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #222; padding: 10px 20px; border-radius: 50px; border: 1px solid var(--border); display: none; z-index: 2000; }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top: 15px; font-weight: 500;">A processar...</p>
    </div>

    <div id="toast"></div>

    <!-- TELA DE LOGIN -->
    <div id="auth-view">
        <div class="auth-card">
            <div style="background:var(--accent); width:60px; height:60px; border-radius:15px; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <i data-lucide="shield-check" color="white" size="32"></i>
            </div>
            <h2>Shadow Vault</h2>
            <p style="color:var(--text-dim); font-size:14px;">Realtime Backup: chatprivit</p>
            <div class="input-group"><i data-lucide="mail" size="18"></i><input type="email" id="email" placeholder="E-mail"></div>
            <div class="input-group"><i data-lucide="lock" size="18"></i><input type="password" id="pass" placeholder="Senha"></div>
            <button class="btn-main" id="btn-login">Entrar / Criar Conta</button>
        </div>
    </div>

    <!-- TELA DA GALERIA -->
    <div id="app-view">
        <header>
            <div>
                <h1 style="margin:0; font-size: 22px;">Cofre Privado</h1>
                <span id="user-display" style="font-size: 12px; color: var(--text-dim);">...</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="sync()" id="sync-btn" style="background:none; border:1px solid #333; color:white; padding:10px; border-radius:10px; cursor:pointer;"><i data-lucide="refresh-cw" size="18"></i></button>
                <button onclick="logout()" style="background:none; border:1px solid #333; color:white; padding:10px; border-radius:10px; cursor:pointer;"><i data-lucide="log-out" size="18"></i></button>
            </div>
        </header>
        <div class="gallery" id="gallery"></div>
    </div>

    <label class="fab" id="fab-btn" style="display:none;">
        <i data-lucide="plus" color="white" size="30"></i>
        <input type="file" id="file-input" hidden accept="image/*,video/*">
    </label>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref as dbRef, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getBytes } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTjPAXUKuyoGaSDsJqfD8dnI3z_nsSvjU",
            authDomain: "chatprivit.firebaseapp.com",
            databaseURL: "https://chatprivit-default-rtdb.firebaseio.com",
            projectId: "chatprivit",
            storageBucket: "chatprivit.firebasestorage.app",
            messagingSenderId: "1036926518672",
            appId: "1:1036926518672:web:3c5d9338f1921378b5df15",
            measurementId: "G-NBSYTCXMHQ"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const database = getDatabase(app);
        const storage = getStorage(app);

        let currentUser = null;
        let idb = null;
        let activeUrls = [];

        lucide.createIcons();

        function showMsg(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function loading(s, t = "Processando...") {
            document.getElementById('loader').style.display = s ? 'flex' : 'none';
            document.getElementById('loader-text').innerText = t;
        }

        // IndexedDB Local
        const request = indexedDB.open("VaultRTDB_V2", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("media", { keyPath: "id" });
        request.onsuccess = e => { idb = e.target.result; };

        // Criptografia (UID do utilizador como chave)
        async function getCryptoKey(uid, salt) {
            const enc = new TextEncoder();
            const material = await crypto.subtle.importKey("raw", enc.encode(uid), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encrypt(buffer, uid) {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await getCryptoKey(uid, salt);
            const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, buffer);
            const res = new Uint8Array(16 + 12 + cipher.byteLength);
            res.set(salt); res.set(iv, 16); res.set(new Uint8Array(cipher), 28);
            return res;
        }

        async function decrypt(data, uid) {
            const salt = data.slice(0, 16);
            const iv = data.slice(16, 28);
            const cipher = data.slice(28);
            const key = await getCryptoKey(uid, salt);
            return crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
        }

        // Lógica de Login
        onAuthStateChanged(auth, user => {
            currentUser = user;
            document.getElementById('auth-view').style.display = user ? 'none' : 'flex';
            document.getElementById('app-view').style.display = user ? 'block' : 'none';
            document.getElementById('fab-btn').style.display = user ? 'flex' : 'none';
            if(user) {
                document.getElementById('user-display').innerText = user.email;
                renderGallery();
            }
        });

        document.getElementById('btn-login').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            if(!e || !p) return;
            loading(true, "Conectando...");
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch {
                try { await createUserWithEmailAndPassword(auth, e, p); }
                catch(err) { alert(err.message); }
            }
            loading(false);
        };

        window.logout = () => signOut(auth);

        // Galeria Local
        async function renderGallery() {
            if(!idb) return;
            const grid = document.getElementById('gallery');
            grid.innerHTML = "";
            activeUrls.forEach(u => URL.revokeObjectURL(u));
            activeUrls = [];

            const tx = idb.transaction("media", "readonly");
            const items = await new Promise(r => tx.objectStore("media").getAll().onsuccess = e => r(e.target.result));

            items.sort((a,b) => b.time - a.time).forEach(async item => {
                try {
                    const dec = await decrypt(item.data, currentUser.uid);
                    const url = URL.createObjectURL(new Blob([dec], { type: item.type }));
                    activeUrls.push(url);
                    const div = document.createElement('div');
                    div.className = "media-card";
                    div.innerHTML = item.type.startsWith('video') 
                        ? `<video src="${url}" muted loop autoplay playsinline></video>` 
                        : `<img src="${url}">`;
                    div.innerHTML += `<div class="overlay"><button onclick="delLocal('${item.id}')" style="background:red; color:white; border:none; padding:10px; border-radius:50%; cursor:pointer;"><i data-lucide="trash-2" size="18"></i></button></div>`;
                    grid.appendChild(div);
                    lucide.createIcons();
                } catch(e) { console.error("Erro ao descriptografar:", e); }
            });
        }

        // Upload (Até 20MB)
        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file || !currentUser) return;
            if(file.size > 20 * 1024 * 1024) return showMsg("Limite de 20MB");

            loading(true, "Criptografando...");
            try {
                const buffer = await file.arrayBuffer();
                const encrypted = await encrypt(buffer, currentUser.uid);
                const id = crypto.randomUUID();
                const time = Date.now();

                // 1. Guardar Local
                const tx = idb.transaction("media", "readwrite");
                tx.objectStore("media").add({ id, data: encrypted, type: file.type, time });
                
                tx.oncomplete = async () => {
                    renderGallery();
                    loading(true, "Fazendo backup na nuvem...");
                    try {
                        await set(dbRef(database, `vault/${currentUser.uid}/${id}`), { id, type: file.type, time });
                        await uploadBytes(sRef(storage, `vault/${currentUser.uid}/${id}`), encrypted);
                        showMsg("Backup concluído!");
                    } catch(err) { showMsg("Salvo localmente (Erro no backup)"); }
                    loading(false);
                };
            } catch(err) { loading(false); alert("Erro ao processar"); }
            e.target.value = "";
        };

        window.delLocal = (id) => {
            if(!confirm("Apagar deste dispositivo?")) return;
            const tx = idb.transaction("media", "readwrite");
            tx.objectStore("media").delete(id);
            tx.oncomplete = () => { renderGallery(); showMsg("Removido localmente"); };
        };

        // RECUPERAÇÃO CORRIGIDA (Prevenindo travamento de transação)
        window.sync = async () => {
            if(!currentUser || !idb) return;
            loading(true, "A aceder ao banco de dados...");
            
            try {
                const snapshot = await get(dbRef(database, `vault/${currentUser.uid}`));
                if(!snapshot.exists()) {
                    loading(false);
                    return showMsg("Nenhum backup encontrado.");
                }

                const cloudData = snapshot.val();
                let count = 0;
                let restored = 0;
                const total = Object.keys(cloudData).length;

                for(let id in cloudData) {
                    count++;
                    const meta = cloudData[id];
                    
                    // Verifica se já existe localmente SEM abrir transação longa
                    const alreadyHas = await new Promise(r => {
                        const q = idb.transaction("media", "readonly").objectStore("media").get(id);
                        q.onsuccess = () => r(!!q.result);
                        q.onerror = () => r(false);
                    });

                    if(!alreadyHas) {
                        loading(true, `Restaurando item ${count} de ${total}...`);
                        try {
                            // BAIXA DA NUVEM (Chamada de rede FORA da transação IDB)
                            const arrayBuffer = await getBytes(sRef(storage, `vault/${currentUser.uid}/${id}`));
                            const encryptedData = new Uint8Array(arrayBuffer);

                            // SALVA NO BANCO LOCAL (Nova transação curta apenas para este item)
                            await new Promise((resolve, reject) => {
                                const tx = idb.transaction("media", "readwrite");
                                const store = tx.objectStore("media");
                                store.put({ ...meta, data: encryptedData });
                                tx.oncomplete = resolve;
                                tx.onerror = reject;
                            });
                            restored++;
                        } catch (e) {
                            console.error(`Erro ao baixar item ${id}:`, e);
                        }
                    }
                }
                
                loading(false);
                renderGallery();
                showMsg(restored > 0 ? `${restored} itens restaurados!` : "Tudo atualizado!");
            } catch(e) { 
                console.error("Erro na sincronização:", e);
                loading(false); 
                alert("Falha ao sincronizar: " + e.message);
            }
        };

    </script>
</body>
</html>
