<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Vault | Private Gallery</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- Login Screen --- */
        #auth-screen {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            margin-top: 10vh;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #1e40af);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .input-group {
            background: var(--card);
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        .input-group i { color: var(--text-dim); margin-right: 10px; }

        input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-primary:active { transform: scale(0.98); }

        /* --- Main Gallery Interface --- */
        #main-app {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            z-index: 10;
        }

        .cloud-status {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: var(--card);
            border: 1px solid #262626;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .btn-icon:hover { border-color: var(--accent); }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .photo-card {
            background: var(--card);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1;
            border: 1px solid #1f1f1f;
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-card:hover .photo-overlay { opacity: 1; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        /* --- Floating Upload --- */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            z-index: 100;
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid #334155;
            display: none;
            z-index: 1000;
            font-size: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Processando...</p>
    </div>

    <div id="toast"></div>

    <div id="auth-screen">
        <div class="logo-icon"><i data-lucide="shield-check" size="32"></i></div>
        <h1 style="margin-bottom: 8px;">Shadow Vault</h1>
        <p style="color: var(--text-dim); margin-bottom: 30px;">Criptografia ponta-a-ponta</p>
        
        <div class="input-group">
            <i data-lucide="mail" size="18"></i>
            <input type="email" id="email" placeholder="E-mail">
        </div>
        <div class="input-group">
            <i data-lucide="lock" size="18"></i>
            <input type="password" id="password" placeholder="Sua Senha">
        </div>
        <button class="btn-primary" id="btn-login">Acessar Cofre</button>
    </div>

    <div id="main-app">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <i data-lucide="folder-lock" class="text-accent"></i>
                <h3 style="margin:0">Meus Arquivos</h3>
            </div>
            <div class="cloud-status">
                <button class="btn-icon" id="btn-sync" title="Recuperar Backup">
                    <i data-lucide="cloud-download" size="16"></i>
                    <span>Restaurar</span>
                </button>
                <button class="btn-icon" id="btn-logout" style="color: var(--text-dim);">
                    <i data-lucide="log-out" size="16"></i>
                </button>
            </div>
        </header>

        <div class="gallery-grid" id="gallery-grid">
            </div>

        <div style="margin-top: 50px; text-align: center; color: var(--text-dim); font-size: 12px;">
            Imagens excluídas aqui permanecem no Firebase para recuperação.
        </div>
    </div>

    <label class="fab" id="fab-upload" style="display: none;">
        <i data-lucide="plus" color="white"></i>
        <input type="file" id="file-input" hidden accept="image/*">
    </label>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração conforme fornecido
        const firebaseConfig = {
            apiKey: "AIzaSyCjBjXo0nR12hIafyCpWXpmoh8OWhlHsjY",
            authDomain: "flutter-ai-playground-95b37.firebaseapp.com",
            projectId: "flutter-ai-playground-95b37",
            storageBucket: "flutter-ai-playground-95b37.firebasestorage.app",
            messagingSenderId: "95966695274",
            appId: "1:95966695274:web:e2c0ba93cda44d87ed9f13"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let currentUser = null;
        let idb = null;

        // Inicializar Icones
        lucide.createIcons();

        // --- Utilidades ---
        function toast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function loading(show, text = "Processando...") {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
            document.getElementById('loading-text').innerText = text;
        }

        // --- IndexedDB (Offline) ---
        const dbReq = indexedDB.open("VaultDB", 1);
        dbReq.onupgradeneeded = e => e.target.result.createObjectStore("media", { keyPath: "id" });
        dbReq.onsuccess = e => { idb = e.target.result; };

        // --- Criptografia ---
        async function processCrypto(data, secret, mode) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(secret), "PBKDF2", false, ["deriveKey"]);
            const salt = mode === 'enc' ? crypto.getRandomValues(new Uint8Array(16)) : new Uint8Array(atob(data).split("").map(c => c.charCodeAt(0))).slice(0, 16);
            
            const key = await crypto.subtle.deriveKey(
                { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, false, [mode === 'enc' ? "encrypt" : "decrypt"]
            );

            if (mode === 'enc') {
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(data));
                const combined = new Uint8Array(salt.length + iv.length + cipher.byteLength);
                combined.set(salt); combined.set(iv, 16); combined.set(new Uint8Array(cipher), 28);
                return btoa(String.fromCharCode(...combined));
            } else {
                const combined = new Uint8Array(atob(data).split("").map(c => c.charCodeAt(0)));
                const iv = combined.slice(16, 28);
                const cipher = combined.slice(28);
                const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, cipher);
                return new TextDecoder().decode(plain);
            }
        }

        // --- Firebase Logic ---
        onAuthStateChanged(auth, user => {
            currentUser = user;
            document.getElementById('auth-screen').style.display = user ? 'none' : 'block';
            document.getElementById('main-app').style.display = user ? 'block' : 'none';
            document.getElementById('fab-upload').style.display = user ? 'flex' : 'none';
            if(user) renderGallery();
        });

        document.getElementById('btn-login').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return toast("Preencha os campos!");
            
            loading(true, "Acedendo ao cofre...");
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch {
                try { 
                    await createUserWithEmailAndPassword(auth, email, pass);
                    toast("Novo cofre criado!");
                } catch { toast("Erro na autenticação."); }
            }
            loading(false);
        };

        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // --- Galeria & Backup ---
        async function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = "";
            
            const tx = idb.transaction("media", "readonly");
            const store = tx.objectStore("media");
            const photos = await new Promise(r => store.getAll().onsuccess = e => r(e.target.result));

            photos.sort((a,b) => b.time - a.time).forEach(async p => {
                const dec = await processCrypto(p.data, currentUser.uid, 'dec');
                const card = document.createElement('div');
                card.className = "photo-card";
                card.innerHTML = `
                    <img src="${dec}">
                    <div class="photo-overlay">
                        <button class="btn-delete" onclick="window.deleteLocal('${p.id}')">
                            <i data-lucide="trash-2" size="18"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
                lucide.createIcons();
            });
        }

        document.getElementById('file-input').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            loading(true, "Protegendo arquivo...");
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const enc = await processCrypto(reader.result, currentUser.uid, 'enc');
                const id = crypto.randomUUID();
                const item = { id, data: enc, time: Date.now() };

                // Salva Local
                const tx = idb.transaction("media", "readwrite");
                tx.objectStore("media").add(item);
                
                // Backup Nuvem
                await setDoc(doc(db, "vault", currentUser.uid, "items", id), item);
                
                renderGallery();
                loading(false);
                toast("Arquivo protegido!");
            };
        };

        window.deleteLocal = (id) => {
            if(!confirm("Remover do dispositivo? (O backup na nuvem permanecerá)")) return;
            const tx = idb.transaction("media", "readwrite");
            tx.objectStore("media").delete(id);
            tx.oncomplete = () => {
                renderGallery();
                toast("Removido localmente.");
            };
        };

        document.getElementById('btn-sync').onclick = async () => {
            loading(true, "Sincronizando com a nuvem...");
            const col = collection(db, "vault", currentUser.uid, "items");
            const snap = await getDocs(col);
            
            const tx = idb.transaction("media", "readwrite");
            const store = tx.objectStore("media");
            snap.forEach(d => store.put(d.data()));
            
            tx.oncomplete = () => {
                renderGallery();
                loading(false);
                toast("Backup restaurado!");
            };
        };
    </script>
</body>
</html>
