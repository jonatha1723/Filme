<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso Seguro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <!-- Google reCAPTCHA Enterprise -->
  <script src="https://www.google.com/recaptcha/enterprise.js?render=6LcNtnssAAAAAFKBj5gKlKWr3nFCYzbmV0lhGkpx"></script>

  <style>
    :root {
      --bg:      #0c0c0e;
      --surface: #111115;
      --border:  #222228;
      --gold:    #c9a96e;
      --gold-d:  #7a6040;
      --text:    #e8e4dc;
      --muted:   #55535a;
      --error:   #d9534f;
      --success: #4caf78;
      --r:       4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #1a1508 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, #0e0e1a 0%, transparent 60%);
      z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4; pointer-events: none; z-index: 0;
    }

    /* ── Pages ── */
    .page {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 1; opacity: 0; pointer-events: none;
      transition: opacity .4s ease;
    }
    .page.active { opacity: 1; pointer-events: all; }

    /* ── Card ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      width: 100%; max-width: 420px; padding: 52px 44px 44px;
      position: relative; box-shadow: 0 40px 80px rgba(0,0,0,.6);
      animation: cardIn .5s cubic-bezier(.22,1,.36,1) both;
    }
    .card::before {
      content: ''; position: absolute;
      top: 0; left: 44px; right: 44px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 11px; letter-spacing: 6px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 36px; opacity: .7;
    }
    .card-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px; line-height: 1.1; color: var(--text); margin-bottom: 6px;
    }
    .card-title em { font-style: italic; color: var(--gold); }
    .card-sub { font-size: 13px; color: var(--muted); margin-bottom: 40px; line-height: 1.6; }

    /* ── Fields ── */
    .field { margin-bottom: 20px; }
    label {
      display: block; font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    input {
      width: 100%; background: #0c0c0e; border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px;
      padding: 13px 16px; outline: none; border-radius: var(--r);
      transition: border-color .2s, box-shadow .2s;
    }
    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 40px #0c0c0e inset !important;
      -webkit-text-fill-color: var(--text) !important;
    }
    input:focus {
      border-color: var(--gold-d);
      box-shadow: 0 0 0 3px rgba(201,169,110,.08);
    }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 46px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 4px; line-height: 0; transition: color .2s;
    }
    .pw-toggle:hover { color: var(--gold); }

    /* ── Button ── */
    .btn-primary {
      width: 100%; background: var(--gold); color: #0c0c0e; border: none;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      letter-spacing: 3px; text-transform: uppercase;
      padding: 15px; cursor: pointer; border-radius: var(--r); margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .btn-primary:hover   { opacity: .88; }
    .btn-primary:active  { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.3); border-top-color: #000;
      border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto;
    }
    .btn-primary.loading .label   { display: none; }
    .btn-primary.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alert ── */
    .alert {
      display: none; padding: 12px 16px; border-radius: var(--r);
      font-size: 13px; line-height: 1.5; margin-bottom: 24px; border-left: 3px solid;
    }
    .alert.show { display: block; }
    .alert.err  { background: rgba(217,83,79,.08);  border-color: var(--error);   color: #f08080; }
    .alert.ok   { background: rgba(76,175,120,.08); border-color: var(--success); color: #80c9a0; }

    /* ══════════════════ DASHBOARD ══════════════════ */
    #page-dash .card { max-width: 520px; padding: 48px; }

    .dash-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 40px;
    }
    .dash-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-d), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif; font-size: 20px;
      color: #0c0c0e; flex-shrink: 0;
    }
    .dash-info { flex: 1; padding-left: 16px; }
    .dash-name  { font-family: 'DM Serif Display', serif; font-size: 22px; }
    .dash-email { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .btn-logout {
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      padding: 8px 16px; cursor: pointer; border-radius: var(--r);
      transition: border-color .2s, color .2s;
    }
    .btn-logout:hover { border-color: var(--error); color: var(--error); }

    .section-label {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold-d); margin-bottom: 16px;
    }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
    .stat-card {
      background: #0c0c0e; border: 1px solid var(--border);
      padding: 20px; border-radius: var(--r);
    }
    .stat-lbl { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--gold); }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      padding: 6px 12px; border-radius: var(--r); border: 1px solid;
    }
    .badge.ok  { background: rgba(76,175,120,.1);  border-color: rgba(76,175,120,.2);  color: var(--success); }
    .badge.err { background: rgba(217,83,79,.1);   border-color: rgba(217,83,79,.2);   color: var(--error); }

    .uid-box {
      background: #0c0c0e; border: 1px solid var(--border);
      padding: 14px 16px; border-radius: var(--r);
      font-size: 11px; color: var(--muted);
      font-family: 'Courier New', monospace; word-break: break-all; line-height: 1.6;
    }
    
    .recaptcha-terms {
      font-size: 10px; color: var(--muted); text-align: center; margin-top: 16px; line-height: 1.4;
    }
    .recaptcha-terms a { color: var(--gold-d); text-decoration: none; }
    .recaptcha-terms a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; }
      #page-dash .card { padding: 32px 24px; }
      .stat-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ════════ LOGIN ════════ -->
  <div class="page active" id="page-login">
    <div class="card">
      <div class="logo">Acesso Seguro</div>
      <h1 class="card-title">Bem-vindo<br><em>de volta.</em></h1>
      <p class="card-sub">Entre com suas credenciais para acessar a área protegida.</p>

      <div class="alert" id="login-alert"></div>

      <div class="field">
        <label for="login-email">E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label for="login-pass">Senha</label>
        <div class="pw-wrap">
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pw-toggle" type="button" onclick="togglePw('login-pass', this)" aria-label="Mostrar senha">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="btn-primary" id="login-btn" onclick="doLogin(event)">
        <span class="label">Entrar</span>
        <span class="spinner"></span>
      </button>

      <!-- reCAPTCHA v3 compliance info -->
      <div class="recaptcha-terms">
        Protegido por reCAPTCHA. Aplicam-se a 
        <a href="https://policies.google.com/privacy" target="_blank">Privacidade</a> e os 
        <a href="https://policies.google.com/terms" target="_blank">Termos</a> do Google.
      </div>
    </div>
  </div>

  <!-- ════════ DASHBOARD (área protegida) ════════ -->
  <div class="page" id="page-dash">
    <div class="card">
      <div class="dash-header">
        <div class="dash-avatar" id="d-avatar">?</div>
        <div class="dash-info">
          <div class="dash-name"  id="d-name">—</div>
          <div class="dash-email" id="d-email">—</div>
        </div>
        <button class="btn-logout" onclick="doLogout()">Sair</button>
      </div>

      <p class="section-label">Visão geral da conta</p>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-lbl">Status</div>
          <div id="d-verified">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Provedor</div>
          <div class="stat-val" style="font-size:18px" id="d-provider">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Membro desde</div>
          <div class="stat-val" style="font-size:20px" id="d-created">—</div>
          <div class="stat-sub"                        id="d-created-f">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-lbl">Último acesso</div>
          <div class="stat-val" style="font-size:20px" id="d-last">—</div>
          <div class="stat-sub"                        id="d-last-f">—</div>
        </div>
      </div>

      <p class="section-label">Identificador único (UID)</p>
      <div class="uid-box" id="d-uid">—</div>
    </div>
  </div>

  <script>
    // ── Firebase init ────────────────────────────────────────
    firebase.initializeApp({
      apiKey:            "AIzaSyDxovej2jTNykdvpv1YQeu2h_FLLexCd8U",
      authDomain:        "projeto-1-12294.firebaseapp.com",
      projectId:         "projeto-1-12294",
      storageBucket:     "projeto-1-12294.firebasestorage.app",
      messagingSenderId: "111404864605",
      appId:             "1:111404864605:web:564e308c7610f270c5e9b4"
    });
    const auth = firebase.auth();

    // ── Proteção real: observer de sessão ────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        fillDashboard(user);
        showPage('page-dash');
      } else {
        showPage('page-login');
      }
    });

    // ── Login Integrado com reCAPTCHA Enterprise ─────────────
    async function doLogin(e) {
      if (e) e.preventDefault();
      
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      const btn   = document.getElementById('login-btn');

      clearAlert('login-alert');
      if (!email || !pass) return showAlert('login-alert', 'Preencha todos os campos.', 'err');

      setLoading(btn, true);

      try {
        // 1. Gera o token do reCAPTCHA Enterprise
        const recaptchaToken = await new Promise((resolve, reject) => {
          grecaptcha.enterprise.ready(async () => {
            try {
              const t = await grecaptcha.enterprise.execute('6LcNtnssAAAAAFKBj5gKlKWr3nFCYzbmV0lhGkpx', { action: 'LOGIN' });
              resolve(t);
            } catch (err) {
              reject(err);
            }
          });
        });

        // 2. Valida o Token via Assessment (Idealmente isto deve ficar no seu Backend!)
        // Substitua 'API_KEY' pela sua Chave de API de Autenticação / Cloud
        const API_KEY = 'API_KEY'; 
        const assessmentUrl = `https://recaptchaenterprise.googleapis.com/v1/projects/double-wit/assessments?key=${API_KEY}`;
        
        try {
          const response = await fetch(assessmentUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              event: {
                token: recaptchaToken,
                expectedAction: "LOGIN",
                siteKey: "6LcNtnssAAAAAFKBj5gKlKWr3nFCYzbmV0lhGkpx"
              }
            })
          });
          
          if (response.ok) {
            const data = await response.json();
            console.log('Assessment Resultado:', data);
            
            // Aqui você validaria a pontuação, ex: if(data.riskAnalysis.score < 0.5) throw new Error(...)
            // if (!data.tokenProperties?.valid) throw new Error("reCAPTCHA inválido.");
          } else {
             console.warn("Aviso: Falha ao chamar Assessment API no client-side (possivelmente API_KEY ausente ou erro de CORS).");
          }
        } catch (apiError) {
          // Engolimos o erro de network da Assessment API apenas para não travar a demo 
          // caso a API_KEY seja inválida. Num ambiente real, você deve bloquear o acesso aqui.
          console.warn('Erro ao conectar com API de Assessment:', apiError);
        }

        // 3. Após validação bem sucedida do reCAPTCHA, faz o login no Firebase
        await auth.signInWithEmailAndPassword(email, pass);

      } catch (error) {
        // Pode ser um erro do Firebase ou do reCAPTCHA
        const msg = friendlyError(error.code) || 'Erro ao processar o login. Tente novamente.';
        showAlert('login-alert', msg, 'err');
        console.error(error);
      } finally {
        setLoading(btn, false);
      }
    }

    // ── Logout ───────────────────────────────────────────────
    function doLogout() { auth.signOut(); }

    // ── Preenche o dashboard com dados reais ─────────────────
    function fillDashboard(user) {
      const name    = user.displayName || user.email.split('@')[0];
      document.getElementById('d-avatar').textContent  = name.charAt(0).toUpperCase();
      document.getElementById('d-name').textContent    = name;
      document.getElementById('d-email').textContent   = user.email;
      document.getElementById('d-uid').textContent     = user.uid;

      const provider = user.providerData[0]?.providerId || 'password';
      document.getElementById('d-provider').textContent =
        provider === 'password' ? 'E-mail / Senha' : provider;

      const vEl = document.getElementById('d-verified');
      vEl.innerHTML = user.emailVerified
        ? `<span class="badge ok"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Verificado</span>`
        : `<span class="badge err"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Não verificado</span>`;

      const fmt = d => {
        if (!d) return ['—', '—'];
        const dt = new Date(d);
        return [
          dt.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }),
          dt.toLocaleDateString('pt-BR', { weekday: 'short', year: 'numeric', month: 'long', day: 'numeric' })
        ];
      };
      const [cd, cdf] = fmt(user.metadata?.creationTime);
      const [ld, ldf] = fmt(user.metadata?.lastSignInTime);
      document.getElementById('d-created').textContent   = cd;
      document.getElementById('d-created-f').textContent = cdf;
      document.getElementById('d-last').textContent      = ld;
      document.getElementById('d-last-f').textContent    = ldf;
    }

    // ── Mensagens de erro amigáveis ──────────────────────────
    function friendlyError(code) {
      if (!code) return null;
      const map = {
        'auth/invalid-email':          'E-mail inválido.',
        'auth/user-not-found':         'Nenhuma conta com este e-mail.',
        'auth/wrong-password':         'Senha incorreta.',
        'auth/invalid-credential':     'E-mail ou senha incorretos.',
        'auth/too-many-requests':      'Muitas tentativas. Tente mais tarde.',
        'auth/network-request-failed': 'Sem conexão. Verifique sua internet.',
        'auth/user-disabled':          'Esta conta foi desativada.',
        'auth/operation-not-allowed':  'Método de login não habilitado no Firebase.',
      };
      return map[code] || `Erro inesperado (${code}).`;
    }

    // ── Helpers de UI ────────────────────────────────────────
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      const target = document.getElementById(id);
      if (!target) return;
      target.classList.add('active');
      const card = target.querySelector('.card');
      if (card) { card.style.animation = 'none'; void card.offsetWidth; card.style.animation = ''; }
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }
    function clearAlert(id) {
      const el = document.getElementById(id);
      el.className = 'alert'; el.textContent = '';
    }
    function setLoading(btn, state) {
      btn.disabled = state;
      btn.classList.toggle('loading', state);
    }

    function togglePw(inputId, btn) {
      const input = document.getElementById(inputId);
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      btn.innerHTML = show
        ? `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
        : `<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
    }

    // Enter aciona o login
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('page-login').classList.contains('active')) {
        e.preventDefault();
        doLogin(e);
      }
    });
  </script>
</body>
</html>
