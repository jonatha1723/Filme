<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu App Simples</title>
    
    <!-- Configuração PWA (Manifest Inline) -->
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk1ldSBBcHAgU2ltcGxlcyIsCiAgInNob3J0X25hbWUiIjogIk1ldUFwcCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjNmNGY2IiwKICAidGhlbWVfY29sb3IiOiAiIzQzMzhmZiIKfQ==">
    <meta name="theme-color" content="#4338ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }
        .safe-area-inset {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .active-tab {
            color: #4338ff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center">
            <h1 id="page-title" class="text-xl font-bold">Meu App</h1>
            <button id="install-btn" class="hidden bg-white text-indigo-600 px-3 py-1 rounded-full text-sm font-bold">
                Instalar App
            </button>
            <i class="fas fa-user-circle text-2xl"></i>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow p-4 mb-20">
        
        <!-- Aba: Home -->
        <div id="home" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h2 class="text-2xl font-bold mb-2">Bem-vindo! 👋</h2>
                <p class="text-gray-600">Este é um modelo de site transformado em aplicativo. Ele é rápido, responsivo e instalável.</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-indigo-100 p-4 rounded-2xl flex flex-col items-center text-center">
                    <i class="fas fa-bolt text-indigo-600 text-2xl mb-2"></i>
                    <span class="text-sm font-semibold">Rápido</span>
                </div>
                <div class="bg-green-100 p-4 rounded-2xl flex flex-col items-center text-center">
                    <i class="fas fa-check-circle text-green-600 text-2xl mb-2"></i>
                    <span class="text-sm font-semibold">Offline</span>
                </div>
            </div>
        </div>

        <!-- Aba: Tarefas -->
        <div id="tasks" class="tab-content space-y-4">
            <h2 class="text-xl font-bold">Minhas Tarefas</h2>
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="Nova tarefa..." class="flex-grow p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <button onclick="addTask()" class="bg-indigo-600 text-white px-4 rounded-xl">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <ul id="task-list" class="space-y-2">
                <!-- Itens serão adicionados aqui -->
            </ul>
        </div>

        <!-- Aba: Configurações -->
        <div id="settings" class="tab-content">
            <h2 class="text-xl font-bold mb-4">Configurações</h2>
            <div class="bg-white rounded-2xl shadow-sm divide-y">
                <div class="p-4 flex justify-between items-center">
                    <span>Notificações</span>
                    <div class="w-12 h-6 bg-gray-300 rounded-full relative">
                        <div class="absolute right-1 top-1 bg-white w-4 h-4 rounded-full shadow-sm"></div>
                    </div>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <span>Modo Escuro</span>
                    <div class="w-12 h-6 bg-gray-300 rounded-full relative">
                        <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full shadow-sm"></div>
                    </div>
                </div>
                <div class="p-4 text-red-500 font-medium">
                    Limpar Dados do Cache
                </div>
            </div>
        </div>

    </main>

    <!-- Navegação Inferior (Bottom Nav) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 safe-area-inset shadow-lg">
        <div class="flex justify-around items-center h-16">
            <button onclick="switchTab('home', this)" class="flex flex-col items-center active-tab">
                <i class="fas fa-home text-xl"></i>
                <span class="text-xs">Início</span>
            </button>
            <button onclick="switchTab('tasks', this)" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-list-ul text-xl"></i>
                <span class="text-xs">Tarefas</span>
            </button>
            <button onclick="switchTab('settings', this)" class="flex flex-col items-center text-gray-400">
                <i class="fas fa-cog text-xl"></i>
                <span class="text-xs">Ajustes</span>
            </button>
        </div>
    </nav>

    <script>
        // Lógica de Navegação por Abas
        function switchTab(tabId, element) {
            // Esconde todos os conteúdos
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Remove cor ativa dos botões
            document.querySelectorAll('nav button').forEach(btn => btn.classList.replace('active-tab', 'text-gray-400'));
            
            // Ativa o selecionado
            document.getElementById(tabId).classList.add('active');
            element.classList.replace('text-gray-400', 'active-tab');
            
            // Altera título
            const titles = { 'home': 'Meu App', 'tasks': 'Tarefas', 'settings': 'Configurações' };
            document.getElementById('page-title').innerText = titles[tabId];
        }

        // Lógica simples de Tarefas
        function addTask() {
            const input = document.getElementById('task-input');
            const val = input.value.trim();
            if (val === '') return;

            const li = document.createElement('li');
            li.className = "bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-gray-100 animate-fade-in";
            li.innerHTML = `
                <span>${val}</span>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-red-500">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            document.getElementById('task-list').prepend(li);
            input.value = '';
        }

        // Registro de Service Worker (Simulado para o PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('fetch', function(event) {
                        event.respondWith(fetch(event.request));
                    });
                `], { type: 'text/javascript' });
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl);
            });
        }

        // Captura o evento de instalação
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('install-btn').classList.add('hidden');
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>
</html>
